<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>수학 문장제 읽기 앱</title>
<link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1677FF;--blue-lt:#E5F2FD;
  --black:#212121;--g55:#555;--g77:#777;--g99:#999;
  --gD9:#D9D9D9;--gEE:#EEEEEE;--gF7:#F7F8F9;
  --red:#FB1A18;--green:#B1E266;--orange:#FFB968;--purple:#E05CDD;
  --font:'SUIT',sans-serif;
  --rsm:8px;--rmd:12px;--rlg:16px;--rf:999px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--gF7);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:16px}
.phone{
  width:375px;height:780px;background:#fff;border-radius:36px;
  box-shadow:0 24px 64px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
  overflow:hidden;display:flex;flex-direction:column;position:relative;
}
@media(max-width:400px){
  body{padding:0}
  .phone{width:100%;height:100vh;border-radius:0;box-shadow:none}
}

/* ── 상단 바 ── */
.topbar{padding:18px 20px 0;display:flex;align-items:center;gap:10px;flex-shrink:0;background:#fff;z-index:10}
.back{width:36px;height:36px;border-radius:50%;background:var(--gF7);border:none;font-size:18px;color:var(--g55);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.back:hover{background:var(--gEE)}
.prog{flex:1}
.prog-lbl{font-size:12px;font-weight:600;color:var(--g77);text-align:center;margin-bottom:6px}
.prog-track{height:6px;background:var(--gEE);border-radius:var(--rf);overflow:hidden}
.prog-fill{height:100%;border-radius:var(--rf);background:var(--blue);transition:width .4s ease}
.xp{display:flex;align-items:center;gap:4px;background:#FFF8E6;border-radius:var(--rf);padding:6px 10px;flex-shrink:0}
.xp-star{width:14px;height:14px;background:var(--orange);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.xp span{font-size:13px;font-weight:700;color:var(--black)}
.dots{display:flex;gap:6px;justify-content:center;padding:12px 20px 0;flex-shrink:0;background:#fff}
.dot{height:4px;border-radius:var(--rf);transition:all .3s ease}
.dot.done{background:var(--blue);width:20px}
.dot.active{background:var(--blue);width:28px;opacity:.4}
.dot.todo{background:var(--gD9);width:20px}

/* ── 고정 문제 카드 ── */
.pinned-prob{padding:12px 20px 0;flex-shrink:0;background:#fff}
.pcrd{background:var(--gF7);border-radius:var(--rlg);padding:14px 16px;border-left:3px solid var(--blue)}
.psen{font-size:15px;font-weight:400;color:var(--black);line-height:1.8}
.hb{font-weight:700;color:var(--blue);background:var(--blue-lt);padding:1px 5px;border-radius:4px}
.hs{font-weight:700;color:var(--red);border:2.5px solid var(--red);border-radius:4px;padding:0 4px;display:inline-block;line-height:1.4}
.pq{font-size:15px;font-weight:700;color:var(--black);line-height:1.65;margin-top:8px}

/* ── 스크롤 영역 ── */
.scroll{flex:1;overflow-y:auto;padding:14px 20px 16px}
.scroll::-webkit-scrollbar{display:none}

/* ── 완료 단계 헤더 ── */
.done-hd{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--gF7);border-radius:var(--rlg);margin-bottom:8px}
.done-chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--rf);background:#EAF3DE;color:#27500A;flex-shrink:0}
.done-title{font-size:13px;font-weight:500;color:var(--g77);flex:1}
.done-ck{font-size:14px;color:#4CAF50}

/* ── 현재 단계 카드 ── */
.cur-card{background:#fff;border:1.5px solid var(--blue);border-radius:var(--rlg);padding:16px;margin-bottom:8px}
.cur-chip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--rf);margin-bottom:12px}
.cur-q{font-size:14px;font-weight:700;color:var(--black);margin-bottom:10px;line-height:1.5}

/* ── 선택지 ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cb{background:#fff;border:1.5px solid var(--gEE);border-radius:var(--rmd);padding:12px 8px;font-family:var(--font);font-size:14px;font-weight:500;color:var(--black);cursor:pointer;text-align:center;line-height:1.4;transition:all .15s}
.cb:hover{border-color:var(--blue);background:var(--blue-lt)}
.cb.sel{border-color:var(--blue);background:var(--blue-lt);color:var(--blue);font-weight:700}
.cb.ok{border-color:#4CAF50;background:#F1FBF2;color:#1B5E20;font-weight:700;pointer-events:none}
.cb.ng{border-color:var(--red);background:#FFF0F0;color:var(--red);font-weight:700;pointer-events:none}
.cb.dim{border-color:var(--gEE);color:var(--g99);background:var(--gF7);pointer-events:none}
.cb.op{font-size:22px;font-weight:700;padding:14px 8px}

/* ── 인라인 피드백 ── */
.ifb{border-radius:var(--rmd);padding:11px 13px;font-size:13px;font-weight:500;line-height:1.6;margin-top:8px}
.ifb-ok{background:#F0FAEA;color:#1B5E20}
.ifb-ng{background:#FFF0F0;color:#8B0000}
.ifb-tip{background:var(--blue-lt);color:#0050CC}
.sub-divider{border:none;border-top:0.5px solid var(--gEE);margin:12px 0}

/* ── 빈칸 식 ── */
.eqa{background:var(--gF7);border-radius:var(--rlg);padding:16px 12px;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.eqr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.eqg{min-width:48px;height:48px;border-radius:var(--rsm);background:var(--blue-lt);color:var(--blue);border:1.5px solid #C2DCFC;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;padding:0 6px}
.eqb{min-width:54px;height:48px;border-radius:var(--rsm);background:#fff;border:2px dashed var(--blue);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;padding:0 6px;transition:all .2s}
.eqb.pulse{animation:pb 1.4s ease-in-out infinite}
@keyframes pb{0%,100%{box-shadow:0 0 0 0 rgba(22,119,255,0)}50%{box-shadow:0 0 0 5px rgba(22,119,255,.13)}}
.eqb.filled{background:var(--green);border:2px solid #7ABF28;color:#1E5200;animation:none}
.eqb.err{background:#FFF0F0;border:2px solid var(--red);color:var(--red);animation:shk .32s ease}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.eqop{font-size:20px;font-weight:700;color:var(--g55)}
.eqeq{font-size:18px;color:var(--g77)}
.eqhint{font-size:12px;font-weight:500;color:var(--blue)}

/* ── 정답 완성 식 ── */
.ansa{background:#F0FAEA;border-radius:var(--rlg);padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ansb{min-width:46px;height:46px;background:var(--green);border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#1E5200;padding:0 5px}

/* ── 인라인 버튼 쌍 ── */
.ibtns{display:flex;gap:8px;margin-top:12px}
.ib{flex:1;padding:12px 8px;border-radius:var(--rlg);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s;text-align:center}
.ib-pri{background:var(--blue);color:#fff}
.ib-pri:hover{background:#0E5FCC}
.ib-out{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}
.ib-out:hover{background:var(--blue-lt)}

/* ── 하단 버튼 ── */
.btm{padding:10px 20px 18px;flex-shrink:0;border-top:1px solid var(--gEE);background:#fff}
.cta{width:100%;padding:15px;border-radius:var(--rlg);font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.cpri{background:var(--blue);color:#fff}
.cpri:hover{background:#0E5FCC}
.cpri:active{transform:scale(.98)}
.cout{background:#fff;color:var(--blue);border:1.5px solid var(--blue);margin-top:8px}
.cout:hover{background:var(--blue-lt)}
.cdis{background:var(--gEE);color:var(--g99);pointer-events:none}

/* TTS */
.tts{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--blue-lt);border-radius:var(--rf);padding:7px 14px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;transition:all .15s;margin-top:10px}
.tts:hover{background:var(--blue-lt)}
.tts-ic{width:16px;height:16px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center}
.tts-ic svg{fill:#fff}

/* ── 인트로·완료 공통 ── */
.full{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;overflow-y:auto}
.full::-webkit-scrollbar{display:none}
.iico{width:72px;height:72px;background:var(--blue-lt);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px}
.it{font-size:24px;font-weight:800;color:var(--black);line-height:1.3;margin-bottom:6px}
.is{font-size:14px;color:var(--g77);line-height:1.7;margin-bottom:28px}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;margin-bottom:24px}
.sc{background:var(--gF7);border-radius:var(--rmd);padding:12px 6px}
.sn{font-size:17px;font-weight:800;color:var(--black)}
.sl{font-size:11px;font-weight:500;color:var(--g99);margin-top:2px}
.dem{font-size:56px;margin-bottom:14px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.dt{font-size:24px;font-weight:800;color:var(--black);margin-bottom:6px}
.ds{font-size:14px;color:var(--g77);line-height:1.7;margin-bottom:20px}
.wtag{padding:4px 10px;border-radius:var(--rf);font-size:12px;font-weight:600}
.wbad{background:#FFF3DC;color:#7A4500}
.wok{background:#F0FAEA;color:#1E5200}
.wr{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}

/* ── 인트로 학년 그리드 ── */
.intro-grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:8px}
.intro-grade-btn{
  background:#fff;border:1.5px solid var(--gEE);border-radius:var(--rlg);
  padding:14px 6px;cursor:pointer;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:all .18s; font-family:var(--font);
}
.intro-grade-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.intro-grade-btn:active{transform:scale(.97)}
.igdot{width:10px;height:10px;border-radius:50%}
.ignum{font-size:22px;font-weight:800;color:var(--black)}
.iglbl{font-size:11px;font-weight:600;color:var(--g77)}
.igcnt{font-size:10px;color:var(--g99)}

/* ── 학년 선택 화면 ── */
.grade-scroll{flex:1;overflow-y:auto;padding:16px 20px 20px}
.grade-scroll::-webkit-scrollbar{display:none}
.grade-section-title{font-size:12px;font-weight:700;color:var(--g99);letter-spacing:.06em;margin-bottom:10px;margin-top:6px}
.grade-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.grade-btn{
  background:#fff;border:1.5px solid var(--gEE);border-radius:var(--rlg);
  padding:16px 8px;cursor:pointer;text-align:center;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:var(--font);
}
.grade-btn:hover{transform:translateY(-2px)}
.grade-btn.selected{border-width:2px}
.grade-btn .gnum{font-size:22px;font-weight:800;color:var(--black)}
.grade-btn .glbl{font-size:11px;font-weight:600;color:var(--g77)}
.grade-btn .gcnt{font-size:10px;font-weight:500;color:var(--g99);margin-top:2px}
.grade-btn .gdot{width:10px;height:10px;border-radius:50%;margin-top:2px}
.grade-btn.g1:hover,.grade-btn.g1.selected{border-color:#1677FF;background:#E5F2FD}
.grade-btn.g2:hover,.grade-btn.g2.selected{border-color:#8DC840;background:#F3FDE8}
.grade-btn.g3:hover,.grade-btn.g3.selected{border-color:#FFB968;background:#FFF5E6}
.grade-btn.g4:hover,.grade-btn.g4.selected{border-color:#FF7D7C;background:#FFF0F0}
.grade-btn.g5:hover,.grade-btn.g5.selected{border-color:#4CAF50;background:#F0FAEA}
.grade-btn.g6:hover,.grade-btn.g6.selected{border-color:#E05CDD;background:#FBE7FB}

/* ── 유형 선택 카드 ── */
.topic-card{
  background:var(--gF7);border-radius:var(--rlg);padding:14px 16px;
  margin-bottom:14px;border-left:3px solid var(--blue);
}
.topic-title{font-size:13px;font-weight:700;color:var(--black);margin-bottom:10px}
.topic-tags{display:flex;flex-wrap:wrap;gap:6px}
.ttag{
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--rf);
  background:#fff;border:1.5px solid var(--gD9);color:var(--g55);
  cursor:pointer;transition:all .15s;font-family:var(--font);
}
.ttag:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.ttag.sel-topic{border-width:2px;font-weight:700}

/* ── 반응형 ── */
@media(min-width:600px){
  body{padding:24px}
  .phone{width:420px;height:860px;border-radius:40px}
  .ignum,.gnum{font-size:26px}
  .cb{font-size:15px;padding:13px 10px}
  .psen,.pq{font-size:16px}
}
@media(min-width:900px){
  body{padding:32px}
  .phone{width:480px;height:900px}
}
/* 가로 모드 */
@media(max-height:500px) and (orientation:landscape){
  body{padding:0;align-items:flex-start}
  .phone{width:100%;height:100vh;border-radius:0;box-shadow:none;flex-direction:row;flex-wrap:wrap}
  .topbar{width:100%;padding:10px 20px 0}
  .dots{width:100%;padding:8px 20px 0}
  .pinned-prob{width:45%;height:calc(100vh - 80px);overflow-y:auto;border-right:1px solid var(--gEE);padding:10px 12px 10px}
  .scroll{width:55%;padding:10px 14px}
  .btm{width:100%;border-top:1px solid var(--gEE);padding:8px 16px 8px}
  .cta{padding:12px}
  .phone.intro-mode,.phone.grade-mode{flex-direction:column}
}
@media(max-width:400px){
  body{padding:0}
  .phone{width:100%;height:100vh;border-radius:0;box-shadow:none}
  .intro-grade-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .grade-grid{grid-template-columns:repeat(3,1fr)}
}

.fi{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── 직접 쓰기 스텝 ── */
.write-input{
  width:100%;padding:13px 15px;
  border:1.5px solid var(--gEE);border-radius:var(--rlg);
  font-family:var(--font);font-size:16px;font-weight:500;color:var(--black);
  background:#fff;resize:none;outline:none;
  transition:border-color .15s;line-height:1.5;
}
.write-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(22,119,255,.1)}
.write-input.ok-inp{border-color:#4CAF50;background:#F6FFFE;color:#1B5E20}
.write-input.ng-inp{border-color:var(--red);background:#FFF5F5}
.write-hint{font-size:12px;color:var(--g99);margin-top:6px;line-height:1.5}
.ai-row{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:var(--rmd);background:var(--blue-lt);color:#0050CC;font-size:13px;font-weight:500;margin-top:8px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:#0050CC;flex-shrink:0;animation:bdot 1s ease-in-out infinite}
@keyframes bdot{0%,100%{opacity:1}50%{opacity:.2}}

/* ── 연습장 AI 피드백 영역 ── */
.ai-fb-area{background:#F0F5FF;border-top:1px solid #C2DCFC;max-height:200px;overflow-y:auto;padding:13px 14px;display:none;flex-shrink:0}
.ai-fb-area.show{display:block}
.ai-fb-area::-webkit-scrollbar{display:none}
.ai-loading{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:#0050CC}
.ai-loading-dot{width:7px;height:7px;border-radius:50%;background:#0050CC;animation:ai-pulse .9s ease-in-out infinite}
.ai-loading-dot:nth-child(2){animation-delay:.2s}
.ai-loading-dot:nth-child(3){animation-delay:.4s}
@keyframes ai-pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.ai-fb-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px}
.ai-fb-row:last-child{margin-bottom:0}
.ai-fb-icon{font-size:16px;flex-shrink:0;line-height:1.4}
.ai-fb-txt{font-size:12.5px;font-weight:500;color:#212121;line-height:1.6;flex:1}
.ai-fb-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:var(--rf);margin-bottom:8px}
.ai-fb-badge.ok{background:#E6F7E6;color:#1B5E20}
.ai-fb-badge.ng{background:#FFEBEE;color:#B71C1C}
.ai-fb-badge.inc{background:#FFF8E1;color:#7A4500}
.ai-fb-badge.empty{background:var(--gEE);color:var(--g77)}
.ai-fb-err{background:#FFF3F3;border-radius:var(--rsm);padding:7px 10px;margin:5px 0;font-size:12px;color:#8B0000;border-left:3px solid var(--red);line-height:1.55}
.ai-fb-advice{background:#E8F4FF;border-radius:var(--rsm);padding:7px 10px;margin-top:5px;font-size:12px;color:#003A7A;border-left:3px solid var(--blue);line-height:1.55}
/* AI 분석 버튼 */
.ai-analyze-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--rf);border:1.5px solid var(--blue);background:#fff;color:var(--blue);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0}
.ai-analyze-btn:hover{background:var(--blue-lt)}
.ai-analyze-btn:disabled{border-color:var(--gD9);color:var(--g99);background:var(--gF7);cursor:not-allowed}
.ai-analyze-btn .btn-spark{font-size:14px}
.scratch-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;flex-direction:column;animation:fi .2s ease}
.scratch-box{margin:14px;flex:1;background:#fff;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.scratch-header{padding:13px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--gEE);flex-shrink:0}
.scratch-canvas-wrap{flex:1;position:relative;overflow:hidden;background:#FAFBFF}
#scratch-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;touch-action:none}
.scratch-toolbar{padding:9px 12px;display:flex;align-items:center;gap:7px;border-top:1px solid var(--gEE);background:#fff;flex-shrink:0;flex-wrap:wrap}
.scr-col{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .12s;flex-shrink:0}
.scr-col:hover{transform:scale(1.15)}
.scr-col.active{border-color:var(--black);transform:scale(1.1)}
.scr-tool{font-size:12px;font-weight:700;padding:5px 11px;border-radius:var(--rf);border:1.5px solid var(--gEE);background:#fff;color:var(--g55);cursor:pointer;font-family:var(--font);transition:all .12s}
.scr-tool.active{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.scr-tool:hover{border-color:var(--blue);color:var(--blue)}
.scr-size{display:flex;align-items:center;gap:4px;flex-shrink:0}
.scr-sz{width:22px;height:22px;border-radius:50%;background:var(--gEE);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g55);transition:all .12s}
.scr-sz.active{background:var(--blue);color:#fff}
/* ── 연습장 버튼 ── */

  5:{ color:'#4CAF50', bg:'#F0FAEA', label:'5학년', desc:'분수 연산, 비율, 속력' },
  6:{ color:'#E05CDD', bg:'#FBE7FB', label:'6학년', desc:'비례, 부피, 평균 역산' },
};

/* ════════════════════════════════════════════
   앱 상태
   ════════════════════════════════════════════ */
const ST = {
  screen: 'intro',
  grade: null,
  selTopic: null,        // 선택된 유형 (null = 전체)
  PS: [],
  pi: 0,
  xp: 24, correct: 0, wrong: 0, weakTypes: [],
  step: 1, doneSteps: [], sub: 'start',
  whatSel: null, numSel: [], opSel: null, eqSel: null,
  step4Write: '',        // 직접 쓰기 입력값
  step4Tracked: false,   // 이 문제 채점 여부
};

function resetSteps(){
  ST.step=1; ST.doneSteps=[]; ST.sub='start';
  ST.whatSel=null; ST.numSel=[]; ST.opSel=null; ST.eqSel=null;
  ST.step4Write=''; ST.step4Tracked=false;
}

const $a = document.getElementById('app');
function render(){
  if     (ST.screen==='intro')        rIntro();
  else if(ST.screen==='grade-select') rGradeSelect();
  else if(ST.screen==='problem')      rProblem();
  else                                 rDone();
}

/* ════════════════════════════════════════════
   인트로 화면
   ════════════════════════════════════════════ */
function rIntro(){
  const gradeBtns = [1,2,3,4,5,6].map(g=>{
    const gi = GRADE_INFO[g];
    return `<button class="intro-grade-btn" onclick="quickGrade(${g})" style="border-color:${gi.color}20">
      <div class="igdot" style="background:${gi.color}"></div>
      <div class="ignum">${g}</div>
      <div class="iglbl">${gi.label}</div>
      <div class="igcnt">${ALL_PROBLEMS[g].length}문제</div>
    </button>`;
  }).join('');

  $a.innerHTML=`
  <div class="full fi intro-mode">
    <div class="iico">📖</div>
    <div class="it">수학 문장제<br>읽기 훈련</div>
    <div class="is">문제를 읽고, 핵심을 찾고,<br>식을 완성하는 연습이에요</div>
    <div class="intro-grade-grid">${gradeBtns}</div>
  </div>`;
}
/* 인트로에서 학년 바로 탭 → 학년선택 화면으로 */
function quickGrade(g){ ST.grade=g; ST.screen='grade-select'; render(); }
function goGradeSelect(){ ST.screen='grade-select'; render(); }

/* ════════════════════════════════════════════
   학년 선택 화면
   ════════════════════════════════════════════ */
function rGradeSelect(){
  const sel  = ST.grade;
  const info = sel ? GRADE_INFO[sel] : null;

  const gradeBtns = [1,2,3,4,5,6].map(g=>{
    const gi = GRADE_INFO[g];
    const isSel = sel===g;
    return `<button class="grade-btn g${g} ${isSel?'selected':''}" onclick="selectGrade(${g})">
      <div class="gdot" style="background:${gi.color}"></div>
      <div class="gnum">${g}</div>
      <div class="glbl">${gi.label}</div>
      <div class="gcnt">${ALL_PROBLEMS[g].length}문제</div>
    </button>`;
  }).join('');

  /* 유형 선택 카드 — 학년 선택 시에만 표시 */
  let topicHtml = '';
  if(info){
    const topics = ALL_PROBLEMS[sel].map(p=>p.type);
    const selTopic = ST.selTopic; // null = 전체
    const tagBtns = [
      `<button class="ttag ${selTopic===null?'sel-topic':''}" style="${selTopic===null?`border-color:${info.color};color:${info.color};background:${info.bg}`:''}" onclick="selTopic(null)">전체</button>`,
      ...topics.map(t=>`<button class="ttag ${selTopic===t?'sel-topic':''}" style="${selTopic===t?`border-color:${info.color};color:${info.color};background:${info.bg}`:''}\" onclick="selTopic('${t.replace(/'/g,'\\\'')}')">${t}</button>`)
    ].join('');
    topicHtml=`
    <div class="topic-card" style="border-left-color:${info.color}">
      <div class="topic-title" style="color:${info.color}">${info.label} 학습 내용 선택</div>
      <div class="topic-tags">${tagBtns}</div>
    </div>`;
  } else {
    topicHtml=`<div class="topic-card" style="border-left-color:var(--gD9)">
      <div class="topic-title" style="color:var(--g77)">학년을 선택하면 학습 내용을 고를 수 있어요</div>
    </div>`;
  }

  /* 시작 버튼 텍스트 */
  const topicLabel = ST.selTopic ? ` · ${ST.selTopic}` : '';
  const startBtn = (sel && info)
    ? `<button class="cta cpri" onclick="startGrade(${sel})" style="background:${info.color}">${info.label}${topicLabel} 시작하기 →</button>`
    : `<button class="cta cdis">학년을 골라주세요</button>`;

  $a.innerHTML=`
  <div class="topbar" style="padding-bottom:0">
    <button class="back" onclick="goIntro()">←</button>
    <div style="flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--black)">학년 선택</div>
    <div style="width:36px"></div>
  </div>
  <div class="grade-scroll fi">
    <div class="grade-section-title" style="margin-top:14px">학년을 골라요</div>
    <div class="grade-grid">${gradeBtns}</div>
    ${topicHtml}
  </div>
  <div class="btm">${startBtn}</div>`;
}

function selectGrade(g){
  ST.grade=g;
  ST.selTopic=null; // 학년 바꾸면 유형 선택 초기화
  render();
}
function selTopic(t){
  ST.selTopic = t;
  render();
}

function startGrade(g){
  ST.grade=g;
  const all = ALL_PROBLEMS[g];
  // 유형이 선택됐으면 해당 유형만, 아니면 전체
  ST.PS = ST.selTopic
    ? all.filter(p=>p.type===ST.selTopic)
    : [...all];
  if(ST.PS.length===0) ST.PS=[...all]; // 혹시 비면 전체로
  ST.pi=0; ST.xp=24; ST.correct=0; ST.wrong=0; ST.weakTypes=[];
  resetSteps();
  ST.screen='problem';
  render();
}

/* ════════════════════════════════════════════
   문제 화면 (v4 엔진 그대로)
   ════════════════════════════════════════════ */
function rProblem(){
  const p    = ST.PS[ST.pi];
  const gi   = GRADE_INFO[ST.grade];
  const prog = ((ST.pi*5 + ST.step) / (ST.PS.length*5)) * 100;

  const dots = [1,2,3,4,5].map(n=>{
    if(ST.doneSteps.includes(n)) return `<div class="dot done"></div>`;
    if(n===ST.step)              return `<div class="dot active"></div>`;
    return                              `<div class="dot todo"></div>`;
  }).join('');

  let doneHtml='';
  ST.doneSteps.forEach(n=>{
    const labels=['','문제 읽기','핵심 찾기','연산 고르기','식 완성하기','읽기 피드백'];
    const chipStyle=n===1?`background:${p.tb};color:${p.tc}`:'background:#EAF3DE;color:#27500A';
    doneHtml+=`<div class="done-hd">
      <span class="done-chip" style="${chipStyle}">${n}단계 ✓</span>
      <span class="done-title">${labels[n]}</span>
      <span class="done-ck">✓</span>
    </div>`;
  });

  const curContent = buildCurrentStep(p);
  const btn = buildBottomBtn(p);

  $a.innerHTML=`
  <div class="topbar">
    <button class="back" onclick="goBack()">←</button>
    <div class="prog">
      <div class="prog-lbl">${gi.label} · ${ST.pi+1} / ${ST.PS.length} 문제</div>
      <div class="prog-track"><div class="prog-fill" style="width:${prog}%;background:${gi.color}"></div></div>
    </div>
    <div class="xp"><div class="xp-star"></div><span>${ST.xp}</span></div>
  </div>
  <div class="dots">${dots}</div>
  <div class="pinned-prob">
    <div class="pcrd" style="border-left-color:${gi.color}">
      <div class="psen">${p.sh}</div>
      <div class="pq">${p.qh}</div>
    </div>
  </div>
  <div class="scroll" id="sa">
    ${doneHtml}
    <div id="cur-step">${curContent}</div>
  </div>
  <div class="btm fi">${btn}</div>`;

  setTimeout(()=>{
    const el=document.getElementById('cur-step');
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    const inp=document.getElementById('write4-inp');
    if(inp && document.activeElement!==inp) inp.focus();
  },80);
}

/* ── 단계 빌더 ── */
function buildCurrentStep(p){
  const s=ST.step;
  if(s===1) return buildStep1(p);
  if(s===2) return buildStep2(p);
  if(s===3) return buildStep3(p);
  if(s===4) return buildStep4(p);
  if(s===5) return buildStep5(p);
  return '';
}

function buildStep1(p){
  const gi=GRADE_INFO[ST.grade];
  return `<div class="cur-card fi">
    <span class="cur-chip" style="background:${p.tb};color:${p.tc}">1단계 · 문제 읽기</span>
    <div style="font-size:14px;color:var(--g77);line-height:1.6">
      위 문제를 천천히 읽어보세요.<br>빨간 박스 단어에 주목해요.
    </div>
    <button class="tts" onclick="tts(${p.id})">
      <div class="tts-ic"><svg width="8" height="10" viewBox="0 0 8 10"><path d="M0 0L8 5L0 10V0Z"/></svg></div>
      문제 듣기
    </button>
  </div>`;
}

function buildStep2(p){
  const sub=ST.sub;
  const whatBtns=p.what.c.map((c,i)=>{
    let cls='cb';
    const locked=sub==='what_fb'||sub==='nums'||sub==='nums_fb';
    if(locked) cls+=i===p.what.a?' ok':' dim';
    else if(ST.whatSel===i) cls+=' sel';
    const oc=locked?'':` onclick="selWhat(${i})"`;
    return `<button class="${cls}"${oc}>${c}</button>`;
  }).join('');
  const whatFb=(sub==='what_fb'||sub==='nums'||sub==='nums_fb')?`
    <div class="ifb ${ST.whatSel===p.what.a?'ifb-ok':'ifb-ng'}">
      ${ST.whatSel===p.what.a?p.what.fb_ok:p.what.fb_ng}</div>`:'';
  let numSection='';
  if(sub==='nums'||sub==='nums_fb'){
    const numBtns=p.nums.c.map((c,i)=>{
      let cls='cb';
      const locked=sub==='nums_fb';
      if(locked) cls+=p.nums.a.includes(i)?' ok':' dim';
      else if(ST.numSel.includes(i)) cls+=' sel';
      const oc=locked?'':` onclick="togNum(${i})"`;
      return `<button class="${cls}"${oc}>${c}</button>`;
    }).join('');
    const sortedSel=[...ST.numSel].sort().join();
    const sortedAns=[...p.nums.a].sort().join();
    const numFb=sub==='nums_fb'?`
      <div class="ifb ${sortedSel===sortedAns?'ifb-ok':'ifb-ng'}">
        ${sortedSel===sortedAns?p.nums.fb_ok:p.nums.fb_ng}</div>`:'';
    numSection=`<hr class="sub-divider">
      <div class="cur-q fi">문제에 나온 숫자를 골라요</div>
      <div class="g2">${numBtns}</div>${numFb}`;
  }
  return `<div class="cur-card fi">
    <span class="cur-chip" style="background:#F3F3F3;color:#555">2단계 · 핵심 찾기</span>
    <div class="cur-q">무엇을 구하는 문제인가요?</div>
    <div class="g2">${whatBtns}</div>${whatFb}${numSection}
  </div>`;
}

function buildStep3(p){
  const sub=ST.sub;
  const opBtns=p.op.c.map((c,i)=>{
    let cls='cb op';
    const locked=sub==='op_fb';
    if(locked) cls+=i===p.op.a?' ok':' dim';
    else if(ST.opSel===i) cls+=' sel';
    const oc=locked?'':` onclick="selOp(${i})"`;
    return `<button class="${cls}"${oc}>${c}</button>`;
  }).join('');
  const opFb=sub==='op_fb'?`
    <div class="ifb ${ST.opSel===p.op.a?'ifb-ok':'ifb-ng'}">
      ${ST.opSel===p.op.a?p.op.fb_ok:p.op.fb_ng}</div>`:'';
  const hintHtml=sub==='start'?`<div class="ifb ifb-tip" style="margin-bottom:4px">${p.op.hint}</div>`:'';
  return `<div class="cur-card fi">
    <span class="cur-chip" style="background:#F3F3F3;color:#555">3단계 · 연산 고르기</span>
    <div class="cur-q">어떤 계산이 필요한가요?</div>
    ${hintHtml}<div class="g2">${opBtns}</div>${opFb}
  </div>`;
}

function buildStep4(p){
  const sub=ST.sub;
  const bp = p.eq.blankPos !== undefined ? p.eq.blankPos : 2;
  const result = p.eq.result !== undefined ? p.eq.result : p.eq.ans;

  /* ── 빈칸 상태 계산 ── */
  let blankCls='eqb pulse', blankTxt='?';
  const isCorrect = sub==='write_correct'||sub==='eq_correct';
  if(isCorrect){ blankCls='eqb filled'; blankTxt=p.eq.ans; }
  else if(sub==='eq_wrong_fb'){ blankCls='eqb err'; blankTxt=ST.eqSel; }
  else if(ST.eqSel&&sub==='choice'){ blankCls='eqb filled'; blankTxt=ST.eqSel; }

  /* ── 식 행 구성 (blankPos 기반) ── */
  function eqRow(bCls,bTxt){
    if(bp===0) return `
      <div class="${bCls}">${bTxt}</div>
      <span class="eqop">${p.eq.op}</span>
      <div class="eqg">${p.eq.g[1]}</div>
      <span class="eqeq">=</span>
      <div class="eqg">${result}</div>`;
    if(bp===1) return `
      <div class="eqg">${p.eq.g[0]}</div>
      <span class="eqop">${p.eq.op}</span>
      <div class="${bCls}">${bTxt}</div>
      <span class="eqeq">=</span>
      <div class="eqg">${result}</div>`;
    return `
      <div class="eqg">${p.eq.g[0]}</div>
      <span class="eqop">${p.eq.op}</span>
      <div class="eqg">${p.eq.g[1]}</div>
      <span class="eqeq">=</span>
      <div class="${bCls}">${bTxt}</div>`;
  }

  const hintLabel = bp===0?'↑ 빈칸(앞)에 들어갈 수를 구해요':
                    bp===1?'↑ 빈칸(가운데)에 들어갈 수를 구해요':
                           '↑ 빈칸에 들어갈 정답을 구해요';

  function eqArea(bCls,bTxt,hint){
    return `<div class="eqa">
      <div class="eqr">${eqRow(bCls,bTxt)}</div>
      <div class="eqhint">${hint}</div>
    </div>`;
  }

  /* ═══════════════════════════════
     1) 직접 쓰기 모드 (write)
  ═══════════════════════════════ */
  if(sub==='write'){
    return `<div class="cur-card fi">
      <span class="cur-chip" style="background:#F3F3F3;color:#555">4단계 · 식 완성하기</span>
      <div class="cur-q">빈칸에 알맞은 수를 직접 써보세요 ✏️</div>
      ${eqArea('eqb pulse','?','↑ 빈칸에 들어갈 값을 아래에 입력해요')}
      <input id="write4-inp" class="write-input" type="text" inputmode="decimal"
        placeholder="정답을 입력해요..."
        value="${escHtml(ST.step4Write)}"
        oninput="ST.step4Write=this.value"
        onkeydown="if(event.key==='Enter')confirmWrite()">
      <div class="write-hint">숫자, 단위 포함해서 써요 · 예: 9, 28, 64%</div>
    </div>`;
  }

  /* ═══════════════════════════════
     2) 직접 쓰기 오답 피드백
  ═══════════════════════════════ */
  if(sub==='write_wrong_fb'){
    return `<div class="cur-card fi">
      <span class="cur-chip" style="background:#F3F3F3;color:#555">4단계 · 식 완성하기</span>
      <div class="cur-q">빈칸에 알맞은 수를 직접 써보세요 ✏️</div>
      ${eqArea('eqb err',ST.step4Write||'?','↑ 다시 확인해봐요')}
      <input class="write-input ng-inp" type="text" value="${escHtml(ST.step4Write)}" disabled>
      <div class="ifb ifb-ng" style="margin-top:8px">${p.eq.fb_ng}</div>
      <div class="ifb ifb-tip" style="margin-top:6px">${p.ftip}</div>
      <div class="ibtns">
        <button class="ib ib-pri" onclick="retryWrite()">다시 써보기</button>
        <button class="ib ib-out" onclick="showChoice()">선택지로 풀기</button>
      </div>
    </div>`;
  }

  /* ═══════════════════════════════
     3) 직접 쓰기 정답
  ═══════════════════════════════ */
  if(sub==='write_correct'){
    return `<div class="cur-card fi">
      <span class="cur-chip" style="background:#F3F3F3;color:#555">4단계 · 식 완성하기</span>
      <div class="cur-q">빈칸을 채워 식을 완성해요</div>
      ${eqArea('eqb filled',p.eq.ans,'↑ 정답이에요!')}
      <div class="ifb ifb-ok">${p.eq.fb_ok}</div>
    </div>`;
  }

  /* ═══════════════════════════════
     4) 선택지 모드 (choice / 기존 start)
  ═══════════════════════════════ */
  const eqBtns=p.eq.c.map(c=>{
    let cls='cb';
    if(sub==='eq_wrong_fb') cls+=c===p.eq.ans?' ok':(c===ST.eqSel?' ng':' dim');
    else if(sub==='eq_correct') cls+=c===p.eq.ans?' ok dim':' dim';
    else if(ST.eqSel===c) cls+=' sel';
    const oc=(sub==='eq_wrong_fb'||sub==='eq_correct')?'':` onclick="selEq('${escJs(c)}')"`;
    return `<button class="${cls}"${oc}>${c}</button>`;
  }).join('');

  const wrongFb=sub==='eq_wrong_fb'?`
    <div class="ifb ifb-ng">${p.eq.fb_ng}</div>
    <div class="ifb ifb-tip" style="margin-top:6px">${p.ftip}</div>
    <div class="ibtns">
      <button class="ib ib-pri" onclick="retryEq()">다시 풀기</button>
      <button class="ib ib-out" onclick="skipToStep5()">다음으로</button>
    </div>`:'';

  const choiceHint = sub==='choice'?`<div class="ifb ifb-tip" style="margin-bottom:8px;font-size:12px">직접 쓰기가 어려웠나요? 아래 선택지에서 골라봐요 👇</div>`:'';

  return `<div class="cur-card fi">
    <span class="cur-chip" style="background:#F3F3F3;color:#555">4단계 · 식 완성하기</span>
    <div class="cur-q">빈칸을 채워 식을 완성해요</div>
    ${eqArea(blankCls,blankTxt,hintLabel)}
    ${choiceHint}<div class="g2">${eqBtns}</div>${wrongFb}
  </div>`;
}

function buildStep5(p){
  const gi=GRADE_INFO[ST.grade];
  const result = p.eq.result !== undefined ? p.eq.result : p.eq.ans;
  return `<div class="cur-card fi">
    <span class="cur-chip" style="background:#F3F3F3;color:#555">5단계 · 읽기 피드백</span>
    <div class="ansa">
      <div class="ansb">${p.eq.g[0]}</div>
      <span class="eqop" style="font-size:18px;color:var(--g55)">${p.eq.op}</span>
      <div class="ansb">${p.eq.g[1]}</div>
      <span class="eqeq" style="font-size:18px">=</span>
      <div class="ansb">${result}</div>
    </div>
    <div class="ifb ifb-ok" style="margin-bottom:8px">
      <strong>잘 풀었어요!</strong><br>${p.eq.fb_ok}
    </div>
    <div class="ifb ifb-tip">
      <strong>이 문제의 읽기 신호</strong><br>${p.ftip}
    </div>
    <button class="scratch-open-btn" onclick="openScratch()">
      ✏️ 계산 연습장 열기
    </button>
  </div>`;
}

/* ── 하단 버튼 ── */
function buildBottomBtn(p){
  const s=ST.step,sub=ST.sub;
  if(s===1) return `<button class="cta cpri" onclick="ok1()">읽었어요 →</button>`;
  if(s===2){
    if(sub==='start') return ST.whatSel!==null
      ?`<button class="cta cpri" onclick="confirmWhat()">확인 →</button>`
      :`<button class="cta cdis">선택해주세요</button>`;
    if(sub==='what_fb') return `<button class="cta cpri" onclick="showNums()">다음 →</button>`;
    if(sub==='nums') return ST.numSel.length>=2
      ?`<button class="cta cpri" onclick="confirmNums()">확인 →</button>`
      :`<button class="cta cdis">숫자를 골라요 (${ST.numSel.length}개 선택됨)</button>`;
    if(sub==='nums_fb') return `<button class="cta cpri" onclick="finishStep2()">연산 고르기 →</button>`;
  }
  if(s===3){
    if(sub==='start') return ST.opSel!==null
      ?`<button class="cta cpri" onclick="confirmOp()">확인 →</button>`
      :`<button class="cta cdis">연산을 골라주세요</button>`;
    if(sub==='op_fb') return `<button class="cta cpri" onclick="finishStep3()">식 세우기 →</button>`;
  }
  if(s===4){
    if(sub==='write') return `<button class="cta cpri" onclick="confirmWrite()">정답 확인 →</button>`;
    if(sub==='write_wrong_fb') return '';
    if(sub==='write_correct') return '';
    if(sub==='choice') return ST.eqSel!==null
      ?`<button class="cta cpri" onclick="confirmEq()">정답 확인 →</button>`
      :`<button class="cta cdis">답을 골라주세요</button>`;
    if(sub==='eq_wrong_fb'||sub==='eq_correct') return '';
  }
  if(s===5){
    const last=ST.pi>=ST.PS.length-1;
    return `<button class="cta cpri" onclick="nxt()">${last?'결과 보기 →':'다음 문제 →'}</button>
            <button class="cta cout" onclick="resetCur()">이 문제 다시 풀기</button>`;
  }
  return '';
}

/* ════════════════════════════════════════════
   액션 함수 (v4와 동일)
   ════════════════════════════════════════════ */
function ok1(){ ST.doneSteps.push(1); ST.step=2; ST.sub='start'; render(); }
function selWhat(i){ ST.whatSel=i; render(); }
function confirmWhat(){ ST.sub='what_fb'; render(); }
function showNums(){ ST.sub='nums'; render(); }
function togNum(i){ const x=ST.numSel.indexOf(i); x>=0?ST.numSel.splice(x,1):ST.numSel.push(i); render(); }
function confirmNums(){ ST.sub='nums_fb'; render(); }
function finishStep2(){ ST.doneSteps.push(2); ST.step=3; ST.sub='start'; render(); }
function selOp(i){ ST.opSel=i; render(); }
function confirmOp(){ ST.sub='op_fb'; render(); }
function finishStep3(){ ST.doneSteps.push(3); ST.step=4; ST.sub='write'; ST.step4Write=''; render(); }
function selEq(c){ ST.eqSel=c; render(); }

/* ── 4단계: 직접 쓰기 ── */
function confirmWrite(){
  const inp=document.getElementById('write4-inp');
  const val=(inp?inp.value:ST.step4Write).trim();
  if(!val){
    const el=document.getElementById('write4-inp');
    if(el){ el.classList.remove('shk'); void el.offsetWidth; el.classList.add('shk'); el.focus(); }
    return;
  }
  ST.step4Write=val;
  const p=ST.PS[ST.pi];
  const norm=s=>String(s).replace(/\s/g,'').toLowerCase();
  if(norm(val)===norm(p.eq.ans)){
    ST.sub='write_correct';
    if(!ST.step4Tracked){ ST.correct++; ST.xp+=3; ST.step4Tracked=true; }
    render();
    setTimeout(()=>{ ST.doneSteps.push(4); ST.step=5; ST.sub='start'; render(); },900);
  } else {
    if(!ST.step4Tracked){ ST.wrong++; ST.step4Tracked=true;
      if(!ST.weakTypes.includes(p.type)) ST.weakTypes.push(p.type); }
    ST.sub='write_wrong_fb'; render();
  }
}
function retryWrite(){ ST.step4Write=''; ST.sub='write'; render(); }
function showChoice(){ ST.eqSel=null; ST.sub='choice'; render(); }

/* ── 4단계: 선택지 ── */
function confirmEq(){
  const p=ST.PS[ST.pi];
  if(ST.eqSel===p.eq.ans){
    ST.sub='eq_correct';
    if(!ST.step4Tracked){ ST.correct++; ST.xp+=3; ST.step4Tracked=true; }
    render();
    setTimeout(()=>{ ST.doneSteps.push(4); ST.step=5; ST.sub='start'; render(); },900);
  } else {
    ST.sub='eq_wrong_fb';
    if(!ST.step4Tracked){ ST.wrong++; ST.step4Tracked=true;
      if(!ST.weakTypes.includes(p.type)) ST.weakTypes.push(p.type); }
    render();
  }
}
function retryEq(){ ST.eqSel=null; ST.sub='choice'; render(); }
function skipToStep5(){ ST.doneSteps.push(4); ST.step=5; ST.sub='start'; render(); }
function nxt(){
  if(ST.pi<ST.PS.length-1){ ST.pi++; resetSteps(); render(); }
  else{ ST.screen='done'; render(); }
}
function resetCur(){ resetSteps(); render(); }

/* ════════════════════════════════════════════
   완료 화면
   ════════════════════════════════════════════ */
function rDone(){
  const gi=GRADE_INFO[ST.grade];
  const rate=Math.round((ST.correct/ST.PS.length)*100);
  const em=rate>=80?'🎉':rate>=60?'👍':'💪';
  const msg=rate>=80?'훌륭해요! 문장을 읽는 눈이 생겼어요.':rate>=60?'잘했어요! 조금만 더 연습해봐요.':'괜찮아요! 다시 한 번 해봐요.';
  const gained=ST.xp-24;
  const wh=ST.weakTypes.length>0
    ?ST.weakTypes.map(t=>`<span class="wtag wbad">${t}</span>`).join('')
    :`<span class="wtag wok">오답 유형 없음</span>`;
  $a.innerHTML=`
  <div class="full fi">
    <div class="dem">${em}</div>
    <div style="font-size:13px;font-weight:700;padding:4px 14px;border-radius:var(--rf);background:${gi.bg};color:${gi.color};margin-bottom:10px">${gi.label} 완료</div>
    <div class="dt">${rate}점 달성!</div>
    <div class="ds">${msg}</div>
    <div class="sg">
      <div class="sc"><div class="sn">${ST.correct}</div><div class="sl">정답</div></div>
      <div class="sc"><div class="sn">${ST.wrong}</div><div class="sl">오답</div></div>
      <div class="sc"><div class="sn">+${gained}</div><div class="sl">획득 XP</div></div>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--g77);margin-bottom:8px;align-self:flex-start">오답 유형</div>
    <div class="wr" style="align-self:flex-start">${wh}</div>
  </div>
  <div class="btm">
    <button class="cta cpri" onclick="restartGrade()" style="background:${gi.color}">이 학년 다시 풀기</button>
    <button class="cta cout" onclick="goGradeSelect()" style="color:${gi.color};border-color:${gi.color}">다른 학년 선택</button>
  </div>`;
}

/* ════════════════════════════════════════════
   유틸
   ════════════════════════════════════════════ */
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function goBack(){
  if(ST.screen==='problem'){
    const s2=['start','what_fb','nums','nums_fb'];
    const s3=['start','op_fb'];
    if(ST.step===2){ const i=s2.indexOf(ST.sub); if(i>0){ST.sub=s2[i-1];render();return;} }
    if(ST.step===3){ const i=s3.indexOf(ST.sub); if(i>0){ST.sub=s3[i-1];render();return;} }
    if(ST.step===4){
      const s4=['write','write_wrong_fb','choice','eq_wrong_fb'];
      const i=s4.indexOf(ST.sub);
      if(i>0){ ST.sub=s4[i-1]; if(ST.sub==='write'){ ST.step4Write=''; } ST.eqSel=null; render(); return; }
    }
    if(ST.step>1){
      ST.step--; ST.doneSteps=ST.doneSteps.filter(n=>n<ST.step);
      ST.sub=ST.step===2?'nums_fb':ST.step===3?'op_fb':'write';
      if(ST.step===4) ST.step4Write='';
      render();
    } else if(ST.pi>0){ ST.pi--; resetSteps(); ST.step=5; ST.doneSteps=[1,2,3,4,5]; render(); }
    else { ST.screen='grade-select'; render(); }
  } else if(ST.screen==='grade-select'){ ST.screen='intro'; render(); }
  else { ST.screen='grade-select'; render(); }
}
function restartGrade(){ startGrade(ST.grade); }
function goGradeSelect(){ ST.screen='grade-select'; render(); }
function goIntro(){ ST.screen='intro'; ST.grade=null; ST.selTopic=null; render(); }

function tts(id){
  let p=null;
  for(const g of Object.values(ALL_PROBLEMS)){
    p=g.find(x=>x.id===id); if(p) break;
  }
  if(!p) return;
  const txt=p.sh.replace(/<[^>]+>/g,'')+' '+p.qh.replace(/<[^>]+>/g,'');
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='ko-KR'; u.rate=0.88;
    window.speechSynthesis.speak(u);
  }
}

/* ════════════════════════════════════════════
   계산 연습장 모달
   ════════════════════════════════════════════ */
let _sc = { ctx:null, drawing:false, color:'#1677FF', erase:false, size:2.5,
            lastX:0, lastY:0 };

function openScratch(){
  if(document.getElementById('scratch-modal')) return;
  const modal=document.createElement('div');
  modal.className='scratch-overlay'; modal.id='scratch-modal';
  modal.innerHTML=`
  <div class="scratch-box">
    <div class="scratch-header">
      <span style="font-size:15px;font-weight:800;flex:1">✏️ 계산 연습장</span>
      <button class="scr-tool" onclick="clearScratch()" style="margin-right:6px">전체 지우기</button>
      <button style="width:32px;height:32px;border-radius:50%;border:none;background:var(--gEE);font-size:16px;cursor:pointer;color:var(--g55)" onclick="closeScratch()">✕</button>
    </div>
    <div class="scratch-canvas-wrap">
      <canvas id="scratch-canvas"></canvas>
    </div>
    <div id="ai-fb-area" class="ai-fb-area"></div>
    <div class="scratch-toolbar">
      <button class="scr-col active" id="scr-c0" style="background:#212121" title="검정" onclick="setScratchColor('#212121',0)"></button>
      <button class="scr-col" id="scr-c1" style="background:#1677FF" title="파랑" onclick="setScratchColor('#1677FF',1)"></button>
      <button class="scr-col" id="scr-c2" style="background:#FB1A18" title="빨강" onclick="setScratchColor('#FB1A18',2)"></button>
      <button class="scr-col" id="scr-c3" style="background:#4CAF50" title="초록" onclick="setScratchColor('#4CAF50',3)"></button>
      <div style="width:1px;height:22px;background:var(--gEE);margin:0 2px;flex-shrink:0"></div>
      <button class="scr-tool" id="scr-erase" onclick="toggleScratchErase()">지우개</button>
      <div style="flex:1"></div>
      <div class="scr-size">
        <button class="scr-sz active" id="sz-s" onclick="setScratchSize(2.5,'s')">S</button>
        <button class="scr-sz" id="sz-m" onclick="setScratchSize(5,'m')">M</button>
        <button class="scr-sz" id="sz-l" onclick="setScratchSize(9,'l')">L</button>
      </div>
    </div>
    <div style="padding:10px 12px;border-top:1px solid var(--gEE);background:#fff;flex-shrink:0">
      <button class="ai-analyze-btn" id="ai-analyze-btn" onclick="analyzeWithAI()" style="width:100%;justify-content:center">
        <span class="btn-spark">✨</span> AI 풀이 분석 받기
      </button>
    </div>
  </div>`;
  document.querySelector('.phone').appendChild(modal);

  // init canvas
  requestAnimationFrame(()=>{
    const wrap=modal.querySelector('.scratch-canvas-wrap');
    const canvas=document.getElementById('scratch-canvas');
    canvas.width=wrap.offsetWidth; canvas.height=wrap.offsetHeight;
    _sc.ctx=canvas.getContext('2d');
    _sc.color='#212121'; _sc.erase=false; _sc.size=2.5; _sc.hasContent=false;
    _applyScStyle();

    // Faint grid lines
    const ctx=_sc.ctx;
    ctx.save(); ctx.strokeStyle='#E8EEF7'; ctx.lineWidth=0.5;
    for(let y=24;y<canvas.height;y+=24){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
    ctx.restore();

    canvas.addEventListener('mousedown',_scrStart);
    canvas.addEventListener('mousemove',_scrMove);
    canvas.addEventListener('mouseup',_scrEnd);
    canvas.addEventListener('mouseleave',_scrEnd);
    canvas.addEventListener('touchstart',_scrTStart,{passive:false});
    canvas.addEventListener('touchmove',_scrTMove,{passive:false});
    canvas.addEventListener('touchend',_scrEnd);
  });
}

function closeScratch(){
  const m=document.getElementById('scratch-modal');
  if(m) m.remove();
  _sc.ctx=null; _sc.drawing=false;
}

function clearScratch(){
  const canvas=document.getElementById('scratch-canvas');
  if(!canvas||!_sc.ctx) return;
  _sc.ctx.clearRect(0,0,canvas.width,canvas.height);
  _sc.hasContent=false;
  // Redraw grid
  const ctx=_sc.ctx;
  ctx.save(); ctx.strokeStyle='#E8EEF7'; ctx.lineWidth=0.5;
  for(let y=24;y<canvas.height;y+=24){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
  ctx.restore();
  // Hide AI feedback
  const fb=document.getElementById('ai-fb-area');
  if(fb){ fb.classList.remove('show'); fb.innerHTML=''; }
}

function setScratchColor(col,idx){
  _sc.color=col; _sc.erase=false;
  for(let i=0;i<4;i++){
    const b=document.getElementById('scr-c'+i);
    if(b) b.classList.toggle('active',i===idx);
  }
  const eb=document.getElementById('scr-erase');
  if(eb) eb.classList.remove('active');
  _applyScStyle();
}

function toggleScratchErase(){
  _sc.erase=!_sc.erase;
  const eb=document.getElementById('scr-erase');
  if(eb) eb.classList.toggle('active',_sc.erase);
  _applyScStyle();
}

function setScratchSize(sz,key){
  _sc.size=sz;
  ['s','m','l'].forEach(k=>{
    const b=document.getElementById('sz-'+k);
    if(b) b.classList.toggle('active',k===key);
  });
  _applyScStyle();
}

function _applyScStyle(){
  if(!_sc.ctx) return;
  _sc.ctx.strokeStyle=_sc.erase?'#FAFBFF':_sc.color;
  _sc.ctx.lineWidth=_sc.erase?_sc.size*6:_sc.size;
  _sc.ctx.lineCap='round'; _sc.ctx.lineJoin='round';
  _sc.ctx.globalCompositeOperation=_sc.erase?'destination-out':'source-over';
}

function _scrPos(e,canvas){
  const r=canvas.getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}
function _scrStart(e){
  _sc.drawing=true; _sc.hasContent=true;
  const c=e.currentTarget;
  const {x,y}=_scrPos(e,c);
  _sc.lastX=x; _sc.lastY=y;
  _sc.ctx.beginPath(); _sc.ctx.arc(x,y,_sc.ctx.lineWidth/2,0,Math.PI*2); _sc.ctx.fill();
}
function _scrMove(e){
  if(!_sc.drawing) return;
  const c=e.currentTarget;
  const {x,y}=_scrPos(e,c);
  _sc.ctx.beginPath(); _sc.ctx.moveTo(_sc.lastX,_sc.lastY); _sc.ctx.lineTo(x,y); _sc.ctx.stroke();
  _sc.lastX=x; _sc.lastY=y;
}
function _scrEnd(){ _sc.drawing=false; }

function _scrTStart(e){ e.preventDefault(); if(!e.touches[0]) return;
  _sc.drawing=true; _sc.hasContent=true;
  const c=e.currentTarget; const r=c.getBoundingClientRect();
  _sc.lastX=e.touches[0].clientX-r.left; _sc.lastY=e.touches[0].clientY-r.top;
  _sc.ctx.beginPath(); _sc.ctx.arc(_sc.lastX,_sc.lastY,_sc.ctx.lineWidth/2,0,Math.PI*2); _sc.ctx.fill();
}
function _scrTMove(e){ e.preventDefault(); if(!_sc.drawing||!e.touches[0]) return;
  const c=e.currentTarget; const r=c.getBoundingClientRect();
  const x=e.touches[0].clientX-r.left; const y=e.touches[0].clientY-r.top;
  _sc.ctx.beginPath(); _sc.ctx.moveTo(_sc.lastX,_sc.lastY); _sc.ctx.lineTo(x,y); _sc.ctx.stroke();
  _sc.lastX=x; _sc.lastY=y;
}

/* ════════════════════════════════════════════
   AI 풀이 분석 (Claude Vision API)
   ════════════════════════════════════════════ */
async function analyzeWithAI(){
  const canvas=document.getElementById('scratch-canvas');
  const fbArea=document.getElementById('ai-fb-area');
  const btn=document.getElementById('ai-analyze-btn');
  if(!canvas||!fbArea) return;

  /* 빈 연습장 */
  if(!_sc.hasContent){
    fbArea.innerHTML=`<div class="ai-fb-badge empty">📝 연습장이 비어 있어요</div>
      <div class="ai-fb-row"><span class="ai-fb-icon">💡</span>
        <span class="ai-fb-txt">풀이 과정을 먼저 연습장에 써주세요. 그러면 AI가 어느 단계가 틀렸는지 분석해줄게요!</span>
      </div>`;
    fbArea.classList.add('show');
    fbArea.scrollIntoView({behavior:'smooth',block:'nearest'});
    return;
  }

  /* 로딩 */
  btn.disabled=true;
  btn.innerHTML='<span class="btn-spark">✨</span> 분석 중...';
  fbArea.innerHTML=`<div class="ai-loading">
    <div class="ai-loading-dot"></div>
    <div class="ai-loading-dot"></div>
    <div class="ai-loading-dot"></div>
    <span>AI가 풀이를 분석하고 있어요...</span>
  </div>`;
  fbArea.classList.add('show');
  fbArea.scrollIntoView({behavior:'smooth',block:'nearest'});

  /* 현재 문제 컨텍스트 */
  const p=ST.PS[ST.pi];
  const bp=p.eq.blankPos!==undefined?p.eq.blankPos:2;
  const result=p.eq.result!==undefined?p.eq.result:p.eq.ans;
  const eqFull=bp===0?`${p.eq.ans} ${p.eq.op} ${p.eq.g[1]} = ${result}`:
               bp===1?`${p.eq.g[0]} ${p.eq.op} ${p.eq.ans} = ${result}`:
                      `${p.eq.g[0]} ${p.eq.op} ${p.eq.g[1]} = ${result}`;
  const blankDesc=bp===0?`빈칸(앞)의 정답: ${p.eq.ans}`:
                  bp===1?`빈칸(중간)의 정답: ${p.eq.ans}`:
                         `빈칸(결과)의 정답: ${result}`;
  const probTxt=p.sh.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  const qTxt=p.qh.replace(/<[^>]+>/g,'').trim();

  /* 캔버스 → 흰 배경 합성 → base64 PNG */
  const tmp=document.createElement('canvas');
  tmp.width=canvas.width; tmp.height=canvas.height;
  const tc=tmp.getContext('2d');
  tc.fillStyle='#FFFFFF'; tc.fillRect(0,0,tmp.width,tmp.height);
  tc.drawImage(canvas,0,0);
  const b64=tmp.toDataURL('image/png').split(',')[1];

  /* /api/analyze 서버리스 함수 호출 (API 키는 서버에서 관리) */
  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        base64: b64,
        problem:{
          text: probTxt,
          question: qTxt,
          equation: eqFull,
          blankDesc: blankDesc,
          answer: String(p.eq.ans),
          result: String(result)
        }
      })
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      throw new Error(e.error||`서버 오류 (${res.status})`);
    }
    const fb=await res.json();
    _renderAIFb(fbArea,fb);
  }catch(err){
    fbArea.innerHTML=`<div class="ai-fb-row"><span class="ai-fb-icon">⚠️</span>
      <span class="ai-fb-txt" style="color:#8B0000">AI 연결에 실패했어요. 잠시 후 다시 시도해봐요.<br>
      <small style="color:var(--g99)">${escHtml(err.message||'')}</small></span></div>`;
  }finally{
    btn.disabled=false;
    btn.innerHTML='<span class="btn-spark">✨</span> AI 풀이 분석 받기';
    fbArea.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function _renderAIFb(area,fb){
  const SM={
    correct:{label:'✅ 풀이가 맞아요!',cls:'ok'},
    wrong:{label:'❌ 틀린 부분이 있어요',cls:'ng'},
    incomplete:{label:'⚠️ 풀이가 완성되지 않았어요',cls:'inc'},
    empty:{label:'📝 연습장이 비어 있어요',cls:'empty'},
  };
  const s=SM[fb.status]||SM.incomplete;
  let h=`<div class="ai-fb-badge ${s.cls}">${s.label}</div>`;
  if(fb.recognized){
    h+=`<div class="ai-fb-row">
      <span class="ai-fb-icon">👁️</span>
      <span class="ai-fb-txt"><strong>인식된 풀이:</strong> ${escHtml(fb.recognized)}</span>
    </div>`;
  }
  if(fb.errors&&fb.errors.length>0){
    fb.errors.forEach(e=>{ h+=`<div class="ai-fb-err">⚠️ ${escHtml(e)}</div>`; });
  }
  if(fb.advice){
    h+=`<div class="ai-fb-advice">💡 ${escHtml(fb.advice)}</div>`;
  }
  area.innerHTML=h;
}

render();
</script>
